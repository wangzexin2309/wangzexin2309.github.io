name: Update GitHub data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const owner = "wangzexin2309";

            const { data: user } = await github.rest.users.getByUsername({
              username: owner
            });

            const repos = await github.paginate(github.rest.repos.listForUser, {
              username: owner,
              per_page: 100,
              sort: "updated",
              type: "owner"
            });

            const payload = {
              generated_at: new Date().toISOString(),
              user: {
                login: user.login,
                avatar_url: user.avatar_url,
                public_repos: user.public_repos,
                followers: user.followers,
                following: user.following
              },
              repos: repos
                .filter((repo) => !repo.fork)
                .map((repo) => ({
                  name: repo.name,
                  html_url: repo.html_url,
                  description: repo.description || "Public GitHub repository.",
                  language: repo.language || "Code",
                  stargazers_count: repo.stargazers_count,
                  updated_at: repo.updated_at,
                  fork: repo.fork
                }))
            };

            fs.mkdirSync("assets", { recursive: true });
            fs.writeFileSync("assets/github-data.json", JSON.stringify(payload, null, 2) + "\n", "utf8");

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-data.json
          git diff --cached --quiet || git commit -m "Update generated GitHub data"
          git push
